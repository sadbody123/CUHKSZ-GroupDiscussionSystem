profile_id: default
description: Baseline retrieval, orchestration, and analysis thresholds.
retrieval:
  mode: rule
  use_indexes_if_available: true
  lexical_top_k: 20
  vector_top_k: 20
  final_top_k: 8
  lexical_weight: 0.5
  vector_weight: 0.5
  title_boost: 1.25
  topic_tag_boost: 1.15
  quality_boost: 0.15
  credibility_boost: 0.15
  top_k_by_role:
    moderator: 5
    ally: 5
    opponent: 5
    coach: 6
  min_quality_score: 0.0
  min_credibility_score: 0.0
  prefer_source_types: []
  topic_match_weight: 1.0
  credibility_weight: 1.0
  quality_weight: 1.0
orchestration:
  intro_turn_threshold: 1
  discussion_turn_threshold: 12
  moderator_intervene_every_n_turns: 0
  summary_trigger_mode: turn_count
  auto_run_max_steps_default: 4
  summary_min_turns: 1
analyzer:
  long_turn_word_threshold: 220
  low_interaction_min_ratio: 0.25
  example_keywords: []
  discussion_language_keywords: []
  support_teammate_keywords: []
  response_linkage_keywords: []
prompting:
  preferred_template_ids: []
  reply_style: balanced
  max_reply_chars_by_role:
    moderator: 1200
    ally: 2000
    opponent: 2000
    coach: 4000
coach:
  coach_verbosity: normal
  preferred_template_ids: []
speech_analysis:
  enabled: false
  analyzer_name: local_wave
  coach_include_speech_section: true
metadata: {}
