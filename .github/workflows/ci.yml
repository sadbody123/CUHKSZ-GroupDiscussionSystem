name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Bootstrap dev_snapshot_v2 (from fixtures)
        env:
          SNAPSHOT_ROOT: ${{ github.workspace }}/app/knowledge/snapshots
        run: python main.py bootstrap-dev-snapshot

      - name: Pytest
        env:
          SNAPSHOT_ROOT: ${{ github.workspace }}/app/knowledge/snapshots
          SESSION_STORAGE_DIR: ${{ github.workspace }}/storage/sessions
          EVAL_REPORT_DIR: ${{ github.workspace }}/storage/eval_reports
          FEEDBACK_REPORT_DIR: ${{ github.workspace }}/storage/feedback_reports
          BUNDLE_DIR: ${{ github.workspace }}/storage/bundles
          DEFAULT_PROVIDER: mock
        run: python -m pytest

      - name: validate-env
        env:
          SNAPSHOT_ROOT: ${{ github.workspace }}/app/knowledge/snapshots
          SESSION_STORAGE_DIR: ${{ github.workspace }}/storage/sessions
          EVAL_REPORT_DIR: ${{ github.workspace }}/storage/eval_reports
          FEEDBACK_REPORT_DIR: ${{ github.workspace }}/storage/feedback_reports
          BUNDLE_DIR: ${{ github.workspace }}/storage/bundles
          DEFAULT_PROVIDER: mock
        run: python main.py validate-env

      - name: run-smoke
        env:
          SNAPSHOT_ROOT: ${{ github.workspace }}/app/knowledge/snapshots
          SESSION_STORAGE_DIR: ${{ github.workspace }}/storage/sessions
          DEFAULT_PROVIDER: mock
        run: |
          python main.py run-smoke \
            --snapshot-id dev_snapshot_v2 \
            --topic-id tc-campus-ai \
            --provider mock \
            --runtime-profile default

      - name: run-evals (smoke suite)
        env:
          SNAPSHOT_ROOT: ${{ github.workspace }}/app/knowledge/snapshots
        run: |
          python main.py run-evals \
            --suite-file tests/fixtures/evals/suites/smoke_suite.yaml \
            --snapshot-dir app/knowledge/snapshots/dev_snapshot_v2 \
            --profile-id default \
            --output-dir storage/eval_reports/ci_smoke
